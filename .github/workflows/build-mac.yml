name: Build MacOS App
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package

      - name: Create Input Folder
        run: |
          mkdir input
          cp target/QuizApp-jar-with-dependencies.jar input/

      - name: Run jpackage
        run: |
          jpackage \
            --input input \
            --dest output \
            --name "JavaQuizApp" \
            --main-jar QuizApp-jar-with-dependencies.jar \
            --main-class com.example.Main \
            --type dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: MacOS-Installer
          path: output/*.dmg
